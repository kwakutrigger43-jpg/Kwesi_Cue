<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kwesi Cue ODDS - Free SportyBet Predictions &amp; Booking Codes</title>
    <meta name="description" content="Get daily free and VIP SportyBet booking codes, predictions and winning slips curated by Kwesi Cue ODDS." />

    <!-- Security headers via meta tags -->
    <!-- Prevents the page from being embedded in iframes (clickjacking protection) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <!-- Prevents MIME-type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Limits referrer information sent to third parties -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Content Security Policy: restrict resource origins to prevent XSS -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self'
        https://*.supabase.co
        https://corsproxy.io
        https://api.allorigins.win
        https://www.sportybet.com;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
